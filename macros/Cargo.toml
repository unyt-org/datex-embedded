[package]
name = "datex-embedded-macros"
version = "0.1.1"
edition = "2024"

[lib]
proc-macro = true

[dependencies]
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"

datex-core = { version = "0.0.12", default-features = false, features = ["std", "compiler", "tokio_runtime"] }
datex-macro-utils = { version = "0.0.1" }