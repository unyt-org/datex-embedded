[package]
name = "datex-core-embedded-macros"
version = "0.1.0"
edition = "2024"

[lib]
proc-macro = true

[dependencies]
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"
serde = { version = "1.0" }

datex-core = { path = "../../datex-core/crates/datex-core", default-features = false, features = ["std", "compiler", "tokio_runtime"] }
